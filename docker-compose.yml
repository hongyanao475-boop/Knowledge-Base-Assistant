services:
  backend:
    build: ./backend
    container_name: rag-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - redis

  frontend:
    build: ./rag-vue-ui
    container_name: rag-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
